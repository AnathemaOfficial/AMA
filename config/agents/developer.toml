# Developer agent — high capacity for interactive development sessions
# Use case: Claude Code, OpenClaw coding-agent, IDE integrations

[agent]
agent_id = "developer"
max_capacity = 50000
rate_limit_per_window = 120
rate_limit_window_secs = 60
# P3: HMAC shared secret for identity binding (min 32 chars)
secret = "safa-developer-agent-secret-key-2026-change-me"

[agent.domains.fs_write_workspace]
enabled = true
max_magnitude_per_action = 500

[agent.domains.fs_read_workspace]
enabled = true
max_magnitude_per_action = 1000

[agent.domains.proc_exec_bounded]
enabled = true
max_magnitude_per_action = 200

[agent.domains.net_out_http]
enabled = true
max_magnitude_per_action = 500
